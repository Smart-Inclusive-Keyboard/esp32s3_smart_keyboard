## Managed-component dependencies for the display.
##
## The AXS15231B QSPI panel controller (Waveshare ESP32-S3-Touch-LCD-3.49)
## is driven directly via the ESP-IDF SPI master driver -- the
## controller's QSPI memory-write protocol requires CS LOW across the
## whole pixel burst with a panel-specific preamble, which the
## Espressif `esp_lcd_axs15231b` managed component does not emit. See
## components/display/src/display_axs15231b.c for the protocol notes
## and the cross-reference to clackups/draftling (the proven driver).
dependencies:
  idf:
    version: ">=5.3.0"
